ai_usage_summary: |
  AI tools were used as development assistants throughout the project for
  architecture discussion, Python debugging, code refactoring, documentation,
  and software engineering best practices. All ranking logic, scoring
  decisions, repository integration, testing, and final implementation were
  manually reviewed, integrated, and validated by the team. No external API
  calls or LLM inference are used during candidate ranking, and no candidate
  data is sent to any AI service during execution.

# ============================================================================
# Approach summary
# ============================================================================

methodology_summary: |
  TOPkACE is a deterministic, CPU-only candidate ranking system designed for
  the Redrob Data & AI Challenge. The pipeline begins by loading and
  preprocessing the benchmark Job Description into a normalized keyword set.
  Candidate profiles are streamed from a JSONL dataset, transformed into a
  structured feature representation, and evaluated across multiple scoring
  components including skill relevance, professional experience, title
  alignment, and recruiter-oriented behavioral signals such as Open-to-Work
  status, recruiter response rate, and notice period. Individual component
  scores are combined using weighted aggregation to produce a normalized final
  score. A bounded min-heap is used to efficiently maintain only the highest
  ranked candidates throughout processing, providing O(N log K) runtime and
  O(K) memory complexity. The final output is a validator-compatible
  submission.csv containing ranked candidates together with concise,
  deterministic reasoning for each recommendation.

